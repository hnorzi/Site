<!--
    So, a writing challenge, but honestly it's more like a mirror. You look at it, you fill it in, and what comes back is basically how you see the world right now.
Here's the deal:
Three poems. Same structure for everyone. But the blanks? Those are yours. You pick the words. You pick the mood. You pick what it means. Someone else will look at the exact same empty spaces and write something completely different. And neither of you is wrong. That's the whole point. That's it. No rules about rhyme, length, perfect grammar. Just... what would you put in that blank?  Could be soft. Could be sharp. Could be something you haven't said out loud to anyone.
Anyway. It's open. Your move. ✍️ 
-->
