<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Checklist</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .add {
      background: #22c55e;
      color: white;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #1f2937;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .text {
      cursor: pointer;
      flex: 1;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .actions button {
      font-size: 12px;
      margin-left: 5px;
    }

    .delete { background: #ef4444; color: white; }
    .edit { background: #3b82f6; color: white; }
    .toggle { background: #f59e0b; color: white; }

    .time {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🏋️ Workout Checklist</h1>

  <div class="input-row">
    <input id="taskInput" placeholder="تمرین جدید..." />
    <button class="add" id="addBtn">اضافه</button>
  </div>

  <ul id="list"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  const input = document.getElementById("taskInput");
  const list = document.getElementById("list");
  const addBtn = document.getElementById("addBtn");

  // ذخیره
  function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  // زمان گذشته
  function timeAgo(date) {
    const diff = Date.now() - date;
    const mins = Math.floor(diff / 60000);
    const hrs = Math.floor(mins / 60);

    if (mins < 1) return "الان";
    if (mins < 60) return mins + " دقیقه پیش";
    if (hrs < 24) return hrs + " ساعت پیش";
    return Math.floor(hrs / 24) + " روز پیش";
  }

  // رندر لیست
  function render() {
    list.innerHTML = "";

    tasks.forEach((t, i) => {
      const li = document.createElement("li");

      li.innerHTML = `
        <div class="top">
          <span class="text ${t.done ? 'done' : ''}">${t.text}</span>

          <div class="actions">
            <button class="toggle">✔</button>
            <button class="edit">ویرایش</button>
            <button class="delete">حذف</button>
          </div>
        </div>

        <div class="time">ساخته شده: ${timeAgo(t.createdAt)}</div>
      `;

      // کلیک روی متن یا تیک = done
      li.querySelector(".text").addEventListener("click", () => {
        toggleTask(i);
      });

      li.querySelector(".toggle").addEventListener("click", () => {
        toggleTask(i);
      });

      li.querySelector(".delete").addEventListener("click", () => {
        deleteTask(i);
      });

      li.querySelector(".edit").addEventListener("click", () => {
        editTask(i);
      });

      list.appendChild(li);
    });

    save();
  }

  // اضافه کردن تسک
  function addTask() {
    const value = input.value.trim();
    if (!value) return;

    tasks.push({
      text: value,
      done: false,
      createdAt: Date.now()
    });

    input.value = "";
    render();
  }

  function deleteTask(i) {
    tasks.splice(i, 1);
    render();
  }

  function toggleTask(i) {
    tasks[i].done = !tasks[i].done;
    render();
  }

  function editTask(i) {
    const newText = prompt("ویرایش تمرین:", tasks[i].text);
    if (newText) {
      tasks[i].text = newText;
      render();
    }
  }

  // event listener امن
  addBtn.addEventListener("click", addTask);

  // Enter هم کار کنه
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") addTask();
  });

  render();
</script>

</body>
</html>
