<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Checklist</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #111827;
      padding: 20px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 5px;
    }

    .add {
      background: #22c55e;
      color: white;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #1f2937;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.5;
    }

    .actions button {
      font-size: 12px;
      margin-left: 5px;
    }

    .delete { background: #ef4444; color: white; }
    .edit { background: #3b82f6; color: white; }
    .toggle { background: #f59e0b; color: white; }

    .time {
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🏋️ Workout Checklist</h1>

  <input id="taskInput" placeholder="تمرین جدید..." />
  <button class="add" onclick="addTask()">اضافه</button>

  <ul id="list"></ul>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function save() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function timeAgo(date) {
    const diff = Date.now() - date;
    const mins = Math.floor(diff / 60000);
    const hrs = Math.floor(mins / 60);

    if (mins < 1) return "الان";
    if (mins < 60) return mins + " دقیقه پیش";
    if (hrs < 24) return hrs + " ساعت پیش";
    return Math.floor(hrs / 24) + " روز پیش";
  }

  function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    tasks.forEach((t, i) => {
      list.innerHTML += `
        <li class="${t.done ? 'done' : ''}">
          
          <div class="top">
            <span onclick="toggle(${i})">${t.text}</span>

            <div class="actions">
              <button class="toggle" onclick="toggle(${i})">✔</button>
              <button class="edit" onclick="editTask(${i})">ویرایش</button>
              <button class="delete" onclick="deleteTask(${i})">حذف</button>
            </div>
          </div>

          <div class="time">
            ساخته شده: ${timeAgo(t.createdAt)}
          </div>

        </
